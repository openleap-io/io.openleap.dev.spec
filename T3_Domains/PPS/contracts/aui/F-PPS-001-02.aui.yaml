# Screen Contract (AUI) — F-PPS-001-02
# Feature: Production Order Browse
# Generated: 2026-04-04
# Template: screen-contract-aui.yaml v1.0.0

featureId: F-PPS-001-02
name: "Production Order Browse"

taskModel:
  root:
    operator: sequential
    children:
      - task: load-reference-data
        description: "Load production orders and filter options"
      - task: fill-form
        description: "User interacts with filters and search"
        operator: enabling
        enabledBy: load-reference-data
      - task: validate-and-submit
        description: "Navigate to order detail or export list"
        operator: enabling
        enabledBy: fill-form

zones:
  - id: zone-header
    name: "Action Bar"
    type: fixed
    priority: 1
    dataBinding: "_meta"
    fields:
      - "Back navigation (link)"
      - "Page title (display)"

  - id: zone-filters
    name: "Filter Bar"
    type: fixed
    priority: 2
    dataBinding: "filters"
    fields:
      - "Search (text input)"
      - "Status filter (select: PLANNED|IN_PROGRESS|COMPLETED|CLOSED|All)"
      - "Plant filter (select)"

  - id: zone-core
    name: "Order List"
    type: fixed
    priority: 3
    dataBinding: "orders"
    fields:
      - "Order Number (display)"
      - "Material (display)"
      - "Plant (display)"
      - "Quantity (display)"
      - "Status (display)"

  - id: zone-extension
    name: "Extension Zone"
    type: variable
    priority: 10
    extensionPoint: "ext.orderListActions"
    absentRule: panel-section-hidden

  - id: zone-actions
    name: "Form Actions"
    type: fixed
    priority: 99
    dataBinding: "_meta.allowedActions"
    fields:
      - "Export (action)"

absentRules:
  - zone: zone-extension
    condition: "No extension point filled for this product"
    rule: panel-section-hidden

businessRules:
  roleGates:
    - zone: zone-actions
      action: "Export"
      requiresRole: "PLANNER"
  stateConditions:
    - action: "Export"
      enabledWhen: "orders.length > 0"
  actionConsequences:
    - action: "Export"
      onSuccess: "download('production-orders.csv')"
    - action: "Select Row"
      onSuccess: "navigate('orderDetail')"
