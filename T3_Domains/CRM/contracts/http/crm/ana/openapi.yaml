openapi: '3.1.0'
info:
  title: CRM Analytics Service API
  version: 1.0.0
  description: REST API for the CRM Analytics Service (ana bounded context)
  contact:
    name: team-crm
    email: team-crm@openleap.io
x-owner: team-crm
x-suite: crm
x-domain: ana
x-service: crm-ana-svc

servers:
  - url: http://localhost:8418/api/crm/ana/v1
    description: Local development
  - url: https://api.openleap.io/api/crm/ana/v1
    description: Production

security:
  - bearerAuth: []

tags:
  - name: Forecasts
  - name: Pipeline Analytics
  - name: Activity Analytics
  - name: Scoring Models

paths:
  /forecasts:
    get:
      summary: List forecast periods
      operationId: get_forecasts
      tags:
        - Forecasts
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
        - name: sort
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  /forecasts/{periodId}:
    get:
      summary: Get forecast detail
      operationId: get_forecasts_period_id
      tags:
        - Forecasts
      parameters:
        - name: periodId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found
  /forecasts/recalculate:
    post:
      summary: Recalculate forecasts
      operationId: post_forecasts_recalculate
      tags:
        - Forecasts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Success
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  /pipeline-analytics:
    get:
      summary: Get pipeline analytics
      operationId: get_pipeline-analytics
      tags:
        - Forecasts
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
        - name: sort
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  /pipeline-analytics/trend:
    get:
      summary: Get pipeline trend
      operationId: get_pipeline-analytics_trend
      tags:
        - Forecasts
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
        - name: sort
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  /activity-analytics:
    get:
      summary: Get activity metrics
      operationId: get_activity-analytics
      tags:
        - Forecasts
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
        - name: sort
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  /activity-analytics/leaderboard:
    get:
      summary: Get activity leaderboard
      operationId: get_activity-analytics_leaderboard
      tags:
        - Forecasts
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
        - name: sort
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  /scoring-models:
    get:
      summary: List scoring models
      operationId: get_scoring-models
      tags:
        - Forecasts
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
        - name: sort
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  /scoring-models/train:
    post:
      summary: Train new model
      operationId: post_scoring-models_train
      tags:
        - Forecasts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Success
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ForecastPeriod:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        version:
          type: integer
    PipelineSnapshot:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        version:
          type: integer
    ActivityMetrics:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        version:
          type: integer
    ScoringModel:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        version:
          type: integer