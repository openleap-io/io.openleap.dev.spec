openapi: '3.1.0'
info:
  title: CRM Activity Service API
  version: 1.0.0
  description: REST API for the CRM Activity Service (act bounded context)
  contact:
    name: team-crm
    email: team-crm@openleap.io
x-owner: team-crm
x-suite: crm
x-domain: act
x-service: crm-act-svc

servers:
  - url: http://localhost:8404/api/crm/act/v1
    description: Local development
  - url: https://api.openleap.io/api/crm/act/v1
    description: Production

security:
  - bearerAuth: []

tags:
  - name: Tasks
  - name: Meetings
  - name: Calls
  - name: Notes
  - name: Timeline

paths:
  /tasks:
    get:
      summary: List tasks
      operationId: get_tasks
      tags:
        - Tasks
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
        - name: sort
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
    post:
      summary: Create task
      operationId: post_tasks
      tags:
        - Tasks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Success
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  /tasks/{id}:
    get:
      summary: Get task
      operationId: get_tasks_id
      tags:
        - Tasks
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found
    put:
      summary: Update task
      operationId: put_tasks_id
      tags:
        - Tasks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found
  /tasks/{id}/complete:
    post:
      summary: Complete task
      operationId: post_tasks_id_complete
      tags:
        - Tasks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
