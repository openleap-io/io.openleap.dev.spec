# Screen Contract (AUI) — F-CO-003-03
# Feature: Variance Analysis
# Generated: 2026-04-04
# Template: screen-contract-aui.yaml v1.0.0

featureId: F-CO-003-03
name: "Variance Analysis"

taskModel:
  root:
    operator: sequential
    children:
      - task: load-variance-data
        description: "Load variance data for selected period"
      - task: fill-filters
        description: "User applies material and threshold filters"
        operator: enabling
        enabledBy: load-variance-data
      - task: navigate-to-detail
        description: "User selects material for category breakdown"
        operator: enabling
        enabledBy: fill-filters

zones:
  - id: zone-header
    name: "Action Bar"
    type: fixed
    priority: 1
    dataBinding: "_meta"
    fields:
      - "Back navigation (link)"
      - "Page title (display)"

  - id: zone-filters
    name: "Filter Bar"
    type: fixed
    priority: 2
    dataBinding: "filters"
    fields:
      - "Period selector (month/year)"
      - "Search Material (text input)"
      - "Minimum Variance (decimal input)"

  - id: zone-core
    name: "Variance List"
    type: fixed
    priority: 3
    dataBinding: "content"
    fields:
      - "Material ID (display)"
      - "Standard Cost (display)"
      - "Actual Cost (display)"
      - "Variance Amount (display)"
      - "Variance % (display)"
      - "Currency (display)"

  - id: zone-extension
    name: "Extension Zone"
    type: variable
    priority: 10
    extensionPoint: "ext.varianceActions"
    absentRule: panel-section-hidden

  - id: zone-actions
    name: "Form Actions"
    type: fixed
    priority: 99
    dataBinding: "_meta.allowedActions"
    fields:
      - "Cancel (action)"

absentRules:
  - zone: zone-extension
    condition: "No extension point filled for this product"
    rule: panel-section-hidden

businessRules:
  roleGates:
    - zone: zone-core
      action: "Navigate"
      requiresRole: "ANY_AUTHENTICATED"
  stateConditions:
    - action: "Navigate"
      enabledWhen: "row.selected == true"
  actionConsequences:
    - action: "Navigate"
      onSuccess: "navigate('variance-detail', { materialId: row.materialId, period: filters.period })"
