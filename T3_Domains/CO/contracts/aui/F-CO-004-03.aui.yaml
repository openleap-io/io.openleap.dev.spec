# Screen Contract (AUI) — F-CO-004-03
# Feature: Profit Center Assignment
# Generated: 2026-04-04
# Template: screen-contract-aui.yaml v1.0.0

featureId: F-CO-004-03
name: "Profit Center Assignment"

taskModel:
  root:
    operator: sequential
    children:
      - task: load-assignments
        description: "Load profit center assignment list"
      - task: fill-form
        description: "User creates or edits an assignment"
        operator: enabling
        enabledBy: load-assignments
      - task: validate-and-submit
        description: "Validate and save assignment"
        operator: enabling
        enabledBy: fill-form

zones:
  - id: zone-header
    name: "Action Bar"
    type: fixed
    priority: 1
    dataBinding: "_meta"
    fields:
      - "Back navigation (link)"
      - "Page title (display)"
      - "Assign (action: primary)"
      - "Bulk Assign (action: secondary)"

  - id: zone-filters
    name: "Filter Bar"
    type: fixed
    priority: 2
    dataBinding: "filters"
    fields:
      - "Search Cost Object (text input)"
      - "Cost Object Type filter (select)"
      - "Profit Center filter (select)"

  - id: zone-core
    name: "Assignment List"
    type: fixed
    priority: 3
    dataBinding: "content"
    fields:
      - "Cost Object ID (display)"
      - "Cost Object Type (display)"
      - "Profit Center (display)"
      - "Valid From (display)"
      - "Status (display)"

  - id: zone-extension
    name: "Extension Zone"
    type: variable
    priority: 10
    extensionPoint: "ext.assignmentActions"
    absentRule: panel-section-hidden

  - id: zone-actions
    name: "Form Actions"
    type: fixed
    priority: 99
    dataBinding: "_meta.allowedActions"
    fields:
      - "Cancel (action)"
      - "Save (action: primary)"

absentRules:
  - zone: zone-extension
    condition: "No extension point filled for this product"
    rule: panel-section-hidden

businessRules:
  roleGates:
    - zone: zone-actions
      action: "Save"
      requiresRole: "CO_ADMIN"
    - zone: zone-header
      action: "Bulk Assign"
      requiresRole: "CO_ADMIN"
  stateConditions:
    - action: "Save"
      enabledWhen: "form.isValid == true"
  actionConsequences:
    - action: "Save"
      onSuccess: "navigate('list') + toast('co.F-CO-004-03.action.save.success')"
    - action: "Remove"
      onSuccess: "refreshList() + toast('co.F-CO-004-03.action.remove.success')"
