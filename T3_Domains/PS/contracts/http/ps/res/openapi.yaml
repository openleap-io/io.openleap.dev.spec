openapi: 3.1.0

info:
  title: "PS Project Staffing API"
  version: "1.0.0"
  description: |
    REST API for the Project Staffing domain within the PS (Project Management) suite.
    Manages project resource demands at the planning level using personas (abstract roles) rather than concrete people. Enables demand planning, staffing slot management, and capacity forecasting across p
  contact:
    name: PS Team
    email: ps-team@openleap.io
  license:
    name: Proprietary

servers:
  - url: http://localhost:8414
    description: Local development
  - url: https://api.openleap.io
    description: Production

x-owner: team-ps
x-suite: ps
x-domain: res
x-service: ps-res-svc

security:
  - bearerAuth: []

tags:
  - name: Persona
    description: "An abstract resource demand profile defining a type of resource needed. Not a real person — a skill/"
  - name: StaffingSlot
    description: "A concrete demand for a persona on a project for a time period and FTE percentage. Can be left as op"

paths:

  /api/ps/res/v1/personas:
    get:
      operationId: list_personas
      summary: "List all Persona entities"
      tags:
        - Persona
      security:
        - bearerAuth: [ps.res:read]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 25
        - name: tenantId
          in: header
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Paginated list of personas
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: array
                    items:
                      $ref: '#/components/schemas/Persona'
                  totalElements:
                    type: integer
                  page:
                    type: integer
                  size:
                    type: integer
    post:
      operationId: create_persona
      summary: "Create a new Persona"
      tags:
        - Persona
      security:
        - bearerAuth: [ps.res:write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PersonaCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Persona'
          headers:
            Location:
              schema:
                type: string
            ETag:
              schema:
                type: string
        '400':
          description: Validation error
        '409':
          description: Conflict (duplicate)

  /api/ps/res/v1/personas/{id}:
    get:
      operationId: get_persona
      summary: "Get Persona by ID"
      tags:
        - Persona
      security:
        - bearerAuth: [ps.res:read]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Persona'
        '404':
          description: Not found
    patch:
      operationId: update_persona
      summary: "Update Persona attributes"
      tags:
        - Persona
      security:
        - bearerAuth: [ps.res:write]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: If-Match
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PersonaUpdate'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Persona'
        '404':
          description: Not found
        '409':
          description: Optimistic lock conflict
    delete:
      operationId: delete_persona
      summary: "Delete Persona"
      tags:
        - Persona
      security:
        - bearerAuth: [ps.res:admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted
        '404':
          description: Not found

  /api/ps/res/v1/staffingslots:
    get:
      operationId: list_staffingslots
      summary: "List all StaffingSlot entities"
      tags:
        - StaffingSlot
      security:
        - bearerAuth: [ps.res:read]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 25
        - name: tenantId
          in: header
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Paginated list of staffingslots
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: array
                    items:
                      $ref: '#/components/schemas/StaffingSlot'
                  totalElements:
                    type: integer
                  page:
                    type: integer
                  size:
                    type: integer
    post:
      operationId: create_staffingslot
      summary: "Create a new StaffingSlot"
      tags:
        - StaffingSlot
      security:
        - bearerAuth: [ps.res:write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StaffingSlotCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffingSlot'
          headers:
            Location:
              schema:
                type: string
            ETag:
              schema:
                type: string
        '400':
          description: Validation error
        '409':
          description: Conflict (duplicate)

  /api/ps/res/v1/staffingslots/{id}:
    get:
      operationId: get_staffingslot
      summary: "Get StaffingSlot by ID"
      tags:
        - StaffingSlot
      security:
        - bearerAuth: [ps.res:read]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffingSlot'
        '404':
          description: Not found
    patch:
      operationId: update_staffingslot
      summary: "Update StaffingSlot attributes"
      tags:
        - StaffingSlot
      security:
        - bearerAuth: [ps.res:write]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: If-Match
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StaffingSlotUpdate'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffingSlot'
        '404':
          description: Not found
        '409':
          description: Optimistic lock conflict
    delete:
      operationId: delete_staffingslot
      summary: "Delete StaffingSlot"
      tags:
        - StaffingSlot
      security:
        - bearerAuth: [ps.res:admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted
        '404':
          description: Not found


components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    Persona:
      type: object
      required:
        - personaId
        - tenantId
        - name
        - isActive
        - version
        - createdAt
        - updatedAt
      properties:
        personaId:
          type: string
          format: uuid
          description: "Unique persona identifier" 
        tenantId:
          type: string
          format: uuid
          description: "Owning tenant" 
        name:
          type: string
          description: "Persona name (e.g., 'Senior Java Developer')" 
        description:
          type: string
          description: "Detailed description of skills and responsibilities" 
        skills:
          type: array
          description: "Required skills (e.g., ['Java', 'Spring Boot', 'PostgreSQL'])" 
        seniorityLevel:
          type: string
          description: "Seniority: JUNIOR, MID, SENIOR, LEAD, PRINCIPAL" 
        defaultHourlyRate:
          type: number
          description: "Default planning rate for budget estimation" 
        isActive:
          type: boolean
          description: "Whether this persona is currently usable" 
        version:
          type: integer
          description: "Optimistic lock version" 
        createdAt:
          type: string
          format: date-time
          description: "Creation timestamp" 
        updatedAt:
          type: string
          format: date-time
          description: "Last update timestamp" 

    PersonaCreate:
      type: object
      description: "Request body for creating a Persona"
      properties:
        # Writable fields only (excludes auto-generated IDs, timestamps, version)
        name:
          type: string

    PersonaUpdate:
      type: object
      description: "Request body for updating a Persona"
      properties:
        # Subset of writable fields for partial update
        name:
          type: string

    StaffingSlot:
      type: object
      required:
        - slotId
        - tenantId
        - projectId
        - personaId
        - startDate
        - endDate
        - ftePercentage
        - status
        - version
        - createdAt
        - updatedAt
      properties:
        slotId:
          type: string
          format: uuid
          description: "Unique slot identifier" 
        tenantId:
          type: string
          format: uuid
          description: "Owning tenant" 
        projectId:
          type: string
          format: uuid
          description: "Project reference" 
        personaId:
          type: string
          format: uuid
          description: "Required persona profile" 
        startDate:
          type: string
          format: date
          description: "Demand start date" 
        endDate:
          type: string
          format: date
          description: "Demand end date" 
        ftePercentage:
          type: number
          description: "FTE allocation percentage (e.g., 0.5 = 50%, 1.0 = 100%)" 
        status:
          type: string
          description: "Slot status: OPEN, FILLED, RELEASED" 
        assignedResourceId:
          type: string
          format: uuid
          description: "Named resource from ops-res-svc (null if unfilled)" 
        assignedResourceName:
          type: string
          description: "Display name of assigned resource" 
        comment:
          type: string
          description: "Notes about this staffing demand" 
        version:
          type: integer
          description: "Optimistic lock version" 
        createdAt:
          type: string
          format: date-time
          description: "Creation timestamp" 
        updatedAt:
          type: string
          format: date-time
          description: "Last update timestamp" 

    StaffingSlotCreate:
      type: object
      description: "Request body for creating a StaffingSlot"
      properties:
        # Writable fields only (excludes auto-generated IDs, timestamps, version)
        name:
          type: string

    StaffingSlotUpdate:
      type: object
      description: "Request body for updating a StaffingSlot"
      properties:
        # Subset of writable fields for partial update
        name:
          type: string


  parameters:
    tenantId:
      name: X-Tenant-ID
      in: header
      required: true
      schema:
        type: string
        format: uuid
      description: Tenant identifier (from JWT or header)

    pageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 0
      description: Page number (zero-based)

    sizeParam:
      name: size
      in: query
      schema:
        type: integer
        default: 25
        maximum: 100
      description: Page size
