openapi: 3.1.0

info:
  title: "PS Portfolio & Program API"
  version: "1.0.0"
  description: |
    REST API for the Portfolio & Program domain within the PS (Project Management) suite.
    Provides portfolio-level governance over projects and programs. Manages project lifecycle definitions (configurable phases and gates), portfolio prioritization and scoring, and cross-project dashboard
  contact:
    name: PS Team
    email: ps-team@openleap.io
  license:
    name: Proprietary

servers:
  - url: http://localhost:8415
    description: Local development
  - url: https://api.openleap.io
    description: Production

x-owner: team-ps
x-suite: ps
x-domain: prt
x-service: ps-prt-svc

security:
  - bearerAuth: []

tags:
  - name: Portfolio
    description: "A governed collection of projects and programs managed as a group for strategic alignment, resource "
  - name: Program
    description: "A grouping of related projects managed in a coordinated way to achieve benefits not available from m"
  - name: Lifecycle
    description: "A configurable sequence of phases and gates that a project passes through from initiation to closure"
  - name: ScoringModel
    description: "A configurable model for scoring and ranking projects in a portfolio. Supports weighted criteria lik"

paths:

