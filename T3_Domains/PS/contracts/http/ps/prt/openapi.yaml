          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 25
        - name: tenantId
          in: header
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Paginated list of portfolios
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: array
                    items:
                      $ref: '#/components/schemas/Portfolio'
                  totalElements:
                    type: integer
                  page:
                    type: integer
                  size:
                    type: integer
    post:
      operationId: create_portfolio
      summary: "Create a new Portfolio"
      tags:
