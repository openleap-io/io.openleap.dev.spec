components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    Portfolio:
      type: object
      required:
        - portfolioId
        - tenantId
        - name
        - ownerId
        - status
        - version
        - createdAt
        - updatedAt
      properties:
        portfolioId:
          type: string
          format: uuid
          description: "Unique portfolio identifier" 
        tenantId:
          type: string
          format: uuid
          description: "Owning tenant" 
        name:
          type: string
          description: "Portfolio name" 
        description:
          type: string
          description: "Portfolio description and strategic purpose" 
        ownerId:
          type: string
          format: uuid
          description: "IAM user ID of portfolio owner/manager" 
        status:
          type: string
          description: "Status: ACTIVE, ARCHIVED" 
        projectIds:
          type: array
          description: "Projects in this portfolio" 
        programIds:
          type: array
          description: "Programs in this portfolio" 
        version:
          type: integer
          description: "Optimistic lock version" 
        createdAt:
          type: string
          format: date-time
          description: "Creation timestamp" 
        updatedAt:
          type: string
          format: date-time
          description: "Last update timestamp" 

    PortfolioCreate:
      type: object
      description: "Request body for creating a Portfolio"
      properties:
        # Writable fields only (excludes auto-generated IDs, timestamps, version)
        name:
          type: string

    PortfolioUpdate:
      type: object
      description: "Request body for updating a Portfolio"
      properties:
        # Subset of writable fields for partial update
        name:
          type: string

    Program:
      type: object
      required:
        - programId
        - tenantId
        - name
        - managerId
        - status
        - version
        - createdAt
        - updatedAt
      properties:
        programId:
          type: string
          format: uuid
          description: "Unique program identifier" 
        tenantId:
          type: string
          format: uuid
          description: "Owning tenant" 
        name:
          type: string
          description: "Program name" 
        description:
          type: string
          description: "Program description" 
        managerId:
          type: string
          format: uuid
          description: "IAM user ID of program manager" 
        status:
          type: string
          description: "Status: ACTIVE, COMPLETED, CANCELLED" 
        projectIds:
          type: array
          description: "Projects in this program" 
        version:
          type: integer
          description: "Optimistic lock version" 
        createdAt:
          type: string
          format: date-time
          description: "Creation timestamp" 
        updatedAt:
          type: string
          format: date-time
          description: "Last update timestamp" 

    ProgramCreate:
      type: object
      description: "Request body for creating a Program"
      properties:
        # Writable fields only (excludes auto-generated IDs, timestamps, version)
        name:
          type: string

    ProgramUpdate:
      type: object
      description: "Request body for updating a Program"
      properties:
        # Subset of writable fields for partial update
        name:
          type: string

    Lifecycle:
      type: object
      required:
        - lifecycleId
        - tenantId
        - name
        - isDefault
        - version
      properties:
        lifecycleId:
          type: string
          format: uuid
          description: "Unique lifecycle identifier" 
        tenantId:
          type: string
          format: uuid
          description: "Owning tenant" 
        name:
          type: string
          description: "Lifecycle name (e.g., 'Standard Waterfall', 'Agile Delivery')" 
        description:
          type: string
          description: "Description" 
        isDefault:
          type: boolean
          description: "Whether this is the tenant's default lifecycle" 
        version:
          type: integer
          description: "Optimistic lock version" 

    LifecycleCreate:
      type: object
      description: "Request body for creating a Lifecycle"
      properties:
        # Writable fields only (excludes auto-generated IDs, timestamps, version)
        name:
          type: string

    LifecycleUpdate:
      type: object
      description: "Request body for updating a Lifecycle"
      properties:
        # Subset of writable fields for partial update
        name:
          type: string

    LifecyclePhase:
      type: object
      required:
        - phaseId
        - name
        - sortOrder
      properties:
        phaseId:
          type: string
          format: uuid
          description: "Unique phase identifier" 
        name:
          type: string
          description: "Phase name (e.g., 'Initiation', 'Planning', 'Execution')" 
        sortOrder:
          type: integer
          description: "Phase order in the lifecycle" 
        entryGateId:
          type: string
          format: uuid
          description: "Gate required to enter this phase" 
        exitGateId:
          type: string
          format: uuid
          description: "Gate required to exit this phase" 

    Gate:
      type: object
      required:
        - gateId
        - name
      properties:
        gateId:
          type: string
          format: uuid
          description: "Unique gate identifier" 
        name:
          type: string
          description: "Gate name (e.g., 'Feasibility Gate', 'Launch Gate')" 
        description:
          type: string
          description: "What is reviewed at this gate" 
        requiredDeliverables:
          type: object
          description: "List of deliverables required for gate review" 
        reviewCriteria:
          type: object
          description: "Criteria for pass/fail/hold decision" 

    GateReview:
      type: object
      required:
        - reviewId
        - gateId
        - projectId
        - reviewDate
        - reviewerId
        - outcome
      properties:
        reviewId:
          type: string
          format: uuid
          description: "Unique review identifier" 
        gateId:
          type: string
          format: uuid
          description: "Gate being reviewed" 
        projectId:
          type: string
          format: uuid
          description: "Project under review" 
        reviewDate:
          type: string
          description: "Date of the review" 
        reviewerId:
          type: string
          format: uuid
          description: "IAM user who conducted the review" 
        outcome:
          type: string
          description: "Review outcome: PROCEED, HOLD, CANCEL" 
        comments:
          type: string
          description: "Review notes and rationale" 

    ScoringModel:
      type: object
      required:
        - scoringModelId
        - tenantId
        - name
      properties:
        scoringModelId:
          type: string
          format: uuid
          description: "Unique scoring model identifier" 
        tenantId:
          type: string
          format: uuid
          description: "Owning tenant" 
        name:
          type: string
          description: "Model name (e.g., 'RICE Scoring', 'Weighted Strategic')" 
        description:
          type: string
          description: "Description of the scoring methodology" 

    ScoringModelCreate:
      type: object
      description: "Request body for creating a ScoringModel"
      properties:
        # Writable fields only (excludes auto-generated IDs, timestamps, version)
        name:
          type: string

    ScoringModelUpdate:
      type: object
      description: "Request body for updating a ScoringModel"
      properties:
        # Subset of writable fields for partial update
        name:
          type: string

    ScoringCriterion:
      type: object
      required:
        - criterionId
        - name
        - weight
        - scale
      properties:
        criterionId:
          type: string
          format: uuid
          description: "Unique criterion identifier" 
        name:
          type: string
          description: "Criterion name (e.g., 'Strategic Alignment', 'ROI')" 
        weight:
          type: number
          description: "Weight 0.0-1.0 (all weights in a model MUST sum to 1.0)" 
        scale:
          type: string
          description: "Scale description (e.g., '1-5', '1-10', 'Low/Medium/High')" 


  parameters:
    tenantId:
      name: X-Tenant-ID
      in: header
      required: true
      schema:
        type: string
        format: uuid
      description: Tenant identifier (from JWT or header)

    pageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 0
      description: Page number (zero-based)

    sizeParam:
      name: size
      in: query
      schema:
        type: integer
        default: 25
        maximum: 100
      description: Page size
