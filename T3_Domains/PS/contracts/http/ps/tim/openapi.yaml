# OpenAPI Contract — ps-tim-svc
# Generated: 2026-04-03
# Convention: contracts/http/ps/tim/openapi.yaml
#
# This is the API contract for Project Time & Costs (ps-tim-svc).
# It is the machine-readable companion to ps_tim-spec.md §6.

openapi: 3.1.0

info:
  title: "PS Project Time & Costs API"
  version: "1.0.0"
  description: |
    REST API for the Project Time & Costs domain within the PS (Project Management) suite.
    Captures time bookings and cost entries against work packages for project cost tracking and progress measurement. Distinct from ops.tim which captures actual working hours for billing and payroll. PS 
  contact:
    name: PS Team
    email: ps-team@openleap.io
  license:
    name: Proprietary

servers:
  - url: http://localhost:8413
    description: Local development
  - url: https://api.openleap.io
    description: Production

x-owner: team-ps
x-suite: ps
x-domain: tim
x-service: ps-tim-svc

security:
  - bearerAuth: []

tags:
  - name: TimeBooking
    description: "A record of planned or estimated effort against a work package by a user, with date and optional act"
  - name: CostEntry
    description: "A unit cost logged against a work package. Uses cost types defined in ps-bud-svc. Examples: 500 km t"

paths:

  /api/ps/tim/v1/timebookings:
    get:
      operationId: list_timebookings
      summary: "List all TimeBooking entities"
      tags:
        - TimeBooking
      security:
        - bearerAuth: [ps.tim:read]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 25
        - name: tenantId
          in: header
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Paginated list of timebookings
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: array
                    items:
                      $ref: '#/components/schemas/TimeBooking'
                  totalElements:
                    type: integer
                  page:
                    type: integer
                  size:
                    type: integer
    post:
      operationId: create_timebooking
      summary: "Create a new TimeBooking"
      tags:
        - TimeBooking
      security:
        - bearerAuth: [ps.tim:write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TimeBookingCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimeBooking'
          headers:
            Location:
              schema:
                type: string
            ETag:
              schema:
                type: string
        '400':
          description: Validation error
        '409':
          description: Conflict (duplicate)

  /api/ps/tim/v1/timebookings/{id}:
    get:
      operationId: get_timebooking
      summary: "Get TimeBooking by ID"
      tags:
        - TimeBooking
      security:
        - bearerAuth: [ps.tim:read]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimeBooking'
        '404':
          description: Not found
    patch:
      operationId: update_timebooking
      summary: "Update TimeBooking attributes"
      tags:
        - TimeBooking
      security:
        - bearerAuth: [ps.tim:write]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: If-Match
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TimeBookingUpdate'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimeBooking'
        '404':
          description: Not found
        '409':
          description: Optimistic lock conflict
    delete:
      operationId: delete_timebooking
      summary: "Delete TimeBooking"
      tags:
        - TimeBooking
      security:
        - bearerAuth: [ps.tim:admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted
        '404':
          description: Not found

  /api/ps/tim/v1/costentrys:
    get:
      operationId: list_costentrys
      summary: "List all CostEntry entities"
      tags:
        - CostEntry
      security:
        - bearerAuth: [ps.tim:read]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 25
        - name: tenantId
          in: header
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Paginated list of costentrys
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: array
                    items:
                      $ref: '#/components/schemas/CostEntry'
                  totalElements:
                    type: integer
                  page:
                    type: integer
                  size:
                    type: integer
    post:
      operationId: create_costentry
      summary: "Create a new CostEntry"
      tags:
        - CostEntry
      security:
        - bearerAuth: [ps.tim:write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CostEntryCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CostEntry'
          headers:
            Location:
              schema:
                type: string
            ETag:
              schema:
                type: string
        '400':
          description: Validation error
        '409':
          description: Conflict (duplicate)

  /api/ps/tim/v1/costentrys/{id}:
    get:
      operationId: get_costentry
      summary: "Get CostEntry by ID"
      tags:
        - CostEntry
      security:
        - bearerAuth: [ps.tim:read]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CostEntry'
        '404':
          description: Not found
    patch:
      operationId: update_costentry
      summary: "Update CostEntry attributes"
      tags:
        - CostEntry
      security:
        - bearerAuth: [ps.tim:write]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: If-Match
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CostEntryUpdate'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CostEntry'
        '404':
          description: Not found
        '409':
          description: Optimistic lock conflict
    delete:
      operationId: delete_costentry
      summary: "Delete CostEntry"
      tags:
        - CostEntry
      security:
        - bearerAuth: [ps.tim:admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted
        '404':
          description: Not found


components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    TimeBooking:
      type: object
      required:
        - timeBookingId
        - tenantId
        - projectId
        - workPackageId
        - userId
        - bookingDate
        - hours
        - status
        - version
        - createdAt
        - updatedAt
      properties:
        timeBookingId:
          type: string
          format: uuid
          description: "Unique booking identifier" 
        tenantId:
          type: string
          format: uuid
          description: "Owning tenant" 
        projectId:
          type: string
          format: uuid
          description: "Project reference" 
        workPackageId:
          type: string
          format: uuid
          description: "Work package reference" 
        userId:
          type: string
          format: uuid
          description: "IAM user who logged the time" 
        bookingDate:
          type: string
          format: date
          description: "Date the work was performed" 
        hours:
          type: number
          description: "Hours worked (positive, max 24)" 
        activityType:
          type: string
          description: "Activity classification (e.g., 'Development', 'Testing', 'Meeting')" 
        comment:
          type: string
          description: "Optional comment" 
        status:
          type: string
          description: "Approval status: DRAFT, SUBMITTED, APPROVED, REJECTED" 
        approvedBy:
          type: string
          format: uuid
          description: "IAM user who approved/rejected" 
        approvedAt:
          type: string
          format: date-time
          description: "Approval timestamp" 
        rejectionReason:
          type: string
          description: "Reason if rejected" 
        version:
          type: integer
          description: "Optimistic lock version" 
        createdAt:
          type: string
          format: date-time
          description: "Creation timestamp" 
        updatedAt:
          type: string
          format: date-time
          description: "Last update timestamp" 

    TimeBookingCreate:
      type: object
      description: "Request body for creating a TimeBooking"
      properties:
        # Writable fields only (excludes auto-generated IDs, timestamps, version)
        name:
          type: string

    TimeBookingUpdate:
      type: object
      description: "Request body for updating a TimeBooking"
      properties:
        # Subset of writable fields for partial update
        name:
          type: string

    CostEntry:
      type: object
      required:
        - costEntryId
        - tenantId
        - projectId
        - workPackageId
        - costTypeId
        - userId
        - entryDate
        - quantity
        - unitRate
        - totalAmount
        - currency
        - status
        - version
        - createdAt
      properties:
        costEntryId:
          type: string
          format: uuid
          description: "Unique cost entry identifier" 
        tenantId:
          type: string
          format: uuid
          description: "Owning tenant" 
        projectId:
          type: string
          format: uuid
          description: "Project reference" 
        workPackageId:
          type: string
          format: uuid
          description: "Work package reference" 
        costTypeId:
          type: string
          format: uuid
          description: "Cost type reference (from ps-bud-svc)" 
        userId:
          type: string
          format: uuid
          description: "IAM user who recorded the cost" 
        entryDate:
          type: string
          format: date
          description: "Date the cost was incurred" 
        quantity:
          type: number
          description: "Quantity in cost type units" 
        unitRate:
          type: number
          description: "Rate per unit (may be auto-filled from cost type rate schedule)" 
        totalAmount:
          type: number
          description: "Calculated: quantity × unitRate" 
        currency:
          type: string
          description: "Currency" 
        comment:
          type: string
          description: "Optional comment" 
        status:
          type: string
          description: "Approval status: DRAFT, SUBMITTED, APPROVED, REJECTED" 
        version:
          type: integer
          description: "Optimistic lock version" 
        createdAt:
          type: string
          format: date-time
          description: "Creation timestamp" 

    CostEntryCreate:
      type: object
      description: "Request body for creating a CostEntry"
      properties:
        # Writable fields only (excludes auto-generated IDs, timestamps, version)
        name:
          type: string

    CostEntryUpdate:
      type: object
      description: "Request body for updating a CostEntry"
      properties:
        # Subset of writable fields for partial update
        name:
          type: string


  parameters:
    tenantId:
      name: X-Tenant-ID
      in: header
      required: true
      schema:
        type: string
        format: uuid
      description: Tenant identifier (from JWT or header)

    pageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 0
      description: Page number (zero-based)

    sizeParam:
      name: size
      in: query
      schema:
        type: integer
        default: 25
        maximum: 100
      description: Page size
