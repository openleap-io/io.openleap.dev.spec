openapi: 3.1.0

info:
  title: "PS Budget & Cost Control API"
  version: "1.0.0"
  description: |
    REST API for the Budget & Cost Control domain within the PS (Project Management) suite.
    Manages project-level financial planning and cost control. Enables creation of budgets with planned labor and unit costs, tracks actual spending against budgets, and provides Earned Value Management (
  contact:
    name: PS Team
    email: ps-team@openleap.io
  license:
    name: Proprietary

servers:
  - url: http://localhost:8412
    description: Local development
  - url: https://api.openleap.io
    description: Production

x-owner: team-ps
x-suite: ps
x-domain: bud
x-service: ps-bud-svc

security:
  - bearerAuth: []

tags:
  - name: Budget
    description: "A financial plan tied to a project, containing planned labor and unit cost lines. Tracks actual cost"
  - name: CostType
    description: "A classification of costs with a unit name and effective-dated rate schedule. Shared with ps-tim-svc"

paths:

  /api/ps/bud/v1/budgets:
    get:
      operationId: list_budgets
      summary: "List all Budget entities"
      tags:
        - Budget
      security:
        - bearerAuth: [ps.bud:read]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 25
        - name: tenantId
          in: header
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Paginated list of budgets
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: array
                    items:
                      $ref: '#/components/schemas/Budget'
                  totalElements:
                    type: integer
                  page:
                    type: integer
                  size:
                    type: integer
    post:
      operationId: create_budget
      summary: "Create a new Budget"
      tags:
        - Budget
      security:
        - bearerAuth: [ps.bud:write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BudgetCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Budget'
          headers:
            Location:
              schema:
                type: string
            ETag:
              schema:
                type: string
        '400':
          description: Validation error
        '409':
          description: Conflict (duplicate)

  /api/ps/bud/v1/budgets/{id}:
    get:
      operationId: get_budget
      summary: "Get Budget by ID"
      tags:
        - Budget
      security:
        - bearerAuth: [ps.bud:read]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Budget'
        '404':
          description: Not found
    patch:
      operationId: update_budget
      summary: "Update Budget attributes"
      tags:
        - Budget
      security:
        - bearerAuth: [ps.bud:write]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: If-Match
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BudgetUpdate'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Budget'
        '404':
          description: Not found
        '409':
          description: Optimistic lock conflict
    delete:
      operationId: delete_budget
      summary: "Delete Budget"
      tags:
        - Budget
      security:
        - bearerAuth: [ps.bud:admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted
        '404':
          description: Not found

