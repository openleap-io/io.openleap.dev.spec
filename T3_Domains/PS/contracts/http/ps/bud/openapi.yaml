components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    Budget:
      type: object
      required:
        - budgetId
        - tenantId
        - projectId
        - name
        - currency
        - totalPlanned
        - status
        - version
        - createdAt
        - updatedAt
      properties:
        budgetId:
          type: string
          format: uuid
          description: "Unique budget identifier" 
        tenantId:
          type: string
          format: uuid
          description: "Owning tenant" 
        projectId:
          type: string
          format: uuid
          description: "Owning project (reference to ps-prj-svc)" 
        name:
          type: string
          description: "Budget name" 
        currency:
          type: string
          description: "Budget currency (e.g., EUR, USD)" 
        totalPlanned:
          type: number
          description: "Total planned amount (sum of all planned lines)" 
        totalActual:
          type: number
          description: "Total actual amount (sum of all actual costs)" 
        status:
          type: string
          description: "Budget status: DRAFT, ACTIVE, CLOSED, OVERSPENT" 
        overspendThreshold:
          type: number
          description: "Percentage threshold for overspend alert (default 90%)" 
        version:
          type: integer
          description: "Optimistic lock version" 
        createdAt:
          type: string
          format: date-time
          description: "Creation timestamp" 
        updatedAt:
          type: string
          format: date-time
          description: "Last update timestamp" 

    BudgetCreate:
      type: object
      description: "Request body for creating a Budget"
      properties:
        # Writable fields only (excludes auto-generated IDs, timestamps, version)
        name:
          type: string

    BudgetUpdate:
      type: object
      description: "Request body for updating a Budget"
      properties:
        # Subset of writable fields for partial update
        name:
          type: string

    PlannedLaborCost:
      type: object
      required:
        - lineId
        - role
        - plannedHours
        - hourlyRate
        - plannedAmount
      properties:
        lineId:
          type: string
          format: uuid
          description: "Unique line identifier" 
        workPackageId:
          type: string
          format: uuid
          description: "Optional WP assignment" 
        personaId:
          type: string
          format: uuid
          description: "Reference to persona in ps-res-svc" 
        role:
          type: string
          description: "Role description (e.g., 'Senior Developer')" 
        plannedHours:
          type: number
          description: "Planned hours" 
        hourlyRate:
          type: number
          description: "Hourly rate in budget currency" 
        plannedAmount:
          type: number
          description: "Calculated: plannedHours × hourlyRate" 
        actualHours:
          type: number
          description: "Actual hours accumulated" 
        actualAmount:
          type: number
          description: "Actual cost accumulated" 

    PlannedUnitCost:
      type: object
      required:
        - lineId
        - costTypeId
        - plannedQuantity
        - unitRate
        - plannedAmount
      properties:
        lineId:
          type: string
          format: uuid
          description: "Unique line identifier" 
        workPackageId:
          type: string
          format: uuid
          description: "Optional WP assignment" 
        costTypeId:
          type: string
          format: uuid
          description: "Reference to CostType" 
        plannedQuantity:
          type: number
          description: "Planned quantity" 
        unitRate:
          type: number
          description: "Rate per unit in budget currency" 
        plannedAmount:
          type: number
          description: "Calculated: plannedQuantity × unitRate" 
        actualQuantity:
          type: number
          description: "Actual quantity accumulated" 
        actualAmount:
          type: number
          description: "Actual cost accumulated" 

    EarnedValueSnapshot:
      type: object
      required:
        - snapshotId
        - snapshotDate
        - plannedValue
        - earnedValue
        - actualCost
        - scheduleVariance
        - costVariance
        - schedulePerformanceIndex
        - costPerformanceIndex
      properties:
        snapshotId:
          type: string
          format: uuid
          description: "Unique snapshot identifier" 
        snapshotDate:
          type: string
          description: "Date of the snapshot" 
        plannedValue:
          type: number
          description: "PV: budgeted cost of work scheduled" 
        earnedValue:
          type: number
          description: "EV: budgeted cost of work performed" 
        actualCost:
          type: number
          description: "AC: actual cost of work performed" 
        scheduleVariance:
          type: number
          description: "SV = EV - PV" 
        costVariance:
          type: number
          description: "CV = EV - AC" 
        schedulePerformanceIndex:
          type: number
          description: "SPI = EV / PV" 
        costPerformanceIndex:
          type: number
          description: "CPI = EV / AC" 
        estimateAtCompletion:
          type: number
          description: "EAC forecast" 
        estimateToComplete:
          type: number
          description: "ETC forecast" 

    CostType:
      type: object
      required:
        - costTypeId
        - tenantId
        - code
        - name
        - unit
        - isActive
      properties:
        costTypeId:
          type: string
          format: uuid
          description: "Unique cost type identifier" 
        tenantId:
          type: string
          format: uuid
          description: "Owning tenant" 
        code:
          type: string
          description: "Short code (e.g., 'TRAVEL', 'HW', 'CONSULT')" 
        name:
          type: string
          description: "Display name" 
        description:
          type: string
          description: "Description" 
        unit:
          type: string
          description: "Unit of measure (e.g., 'km', 'piece', 'hour', 'license')" 
        isActive:
          type: boolean
          description: "Whether this cost type is currently usable" 

    CostTypeCreate:
      type: object
      description: "Request body for creating a CostType"
      properties:
        # Writable fields only (excludes auto-generated IDs, timestamps, version)
        name:
          type: string

    CostTypeUpdate:
      type: object
      description: "Request body for updating a CostType"
      properties:
        # Subset of writable fields for partial update
        name:
          type: string

    RateScheduleEntry:
      type: object
      required:
        - entryId
        - effectiveFrom
        - rate
        - currency
      properties:
        entryId:
          type: string
          format: uuid
          description: "Unique entry identifier" 
        effectiveFrom:
          type: string
          description: "Rate effective from this date" 
        effectiveTo:
          type: string
          description: "Rate effective until this date (null = open-ended)" 
        rate:
          type: number
          description: "Rate per unit in the reference currency" 
        currency:
          type: string
          description: "Currency of the rate" 


  parameters:
    tenantId:
      name: X-Tenant-ID
      in: header
      required: true
      schema:
        type: string
        format: uuid
      description: Tenant identifier (from JWT or header)

    pageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 0
      description: Page number (zero-based)

    sizeParam:
      name: size
      in: query
      schema:
        type: integer
        default: 25
        maximum: 100
      description: Page size
