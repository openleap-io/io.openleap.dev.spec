info:
  title: "PS Agile & Boards API"
  version: "1.0.0"
  description: |
    REST API for the Agile & Boards domain within the PS (Project Management) suite.
    Provides agile project management capabilities on top of the work packages defined in ps.prj. Manages sprints (time-boxed iterations), product and sprint backlogs, Kanban boards, and agile metrics (st
  contact:
    name: PS Team
    email: ps-team@openleap.io
  license:
    name: Proprietary

servers:
