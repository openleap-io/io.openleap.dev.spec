components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    Sprint:
      type: object
      required:
        - sprintId
        - tenantId
        - projectId
        - name
        - status
        - startDate
        - endDate
        - version
        - createdAt
        - updatedAt
      properties:
        sprintId:
          type: string
          format: uuid
          description: "Unique sprint identifier" 
        tenantId:
          type: string
          format: uuid
          description: "Owning tenant" 
        projectId:
          type: string
          format: uuid
          description: "Owning project (reference to ps-prj-svc)" 
        name:
          type: string
          description: "Sprint name (e.g., 'Sprint 12')" 
        goal:
          type: string
          description: "Sprint goal statement" 
        status:
          type: string
          description: "Sprint status: PLANNED, ACTIVE, CLOSED" 
        startDate:
          type: string
          format: date
          description: "Sprint start date" 
        endDate:
          type: string
          format: date
          description: "Sprint end date" 
        committedPoints:
          type: integer
          description: "Total story points committed at sprint start" 
        completedPoints:
          type: integer
          description: "Total story points completed at sprint close" 
        velocity:
          type: number
          description: "Rolling average velocity after sprint close" 
        version:
          type: integer
          description: "Optimistic lock version" 
        createdAt:
          type: string
          format: date-time
          description: "Creation timestamp" 
        updatedAt:
          type: string
          format: date-time
          description: "Last update timestamp" 

    SprintCreate:
      type: object
      description: "Request body for creating a Sprint"
      properties:
        # Writable fields only (excludes auto-generated IDs, timestamps, version)
        name:
          type: string

    SprintUpdate:
      type: object
      description: "Request body for updating a Sprint"
      properties:
        # Subset of writable fields for partial update
        name:
          type: string

    Backlog:
      type: object
      required:
        - backlogId
        - tenantId
        - projectId
        - type
      properties:
        backlogId:
          type: string
          format: uuid
          description: "Unique backlog identifier" 
        tenantId:
          type: string
          format: uuid
          description: "Owning tenant" 
        projectId:
          type: string
          format: uuid
          description: "Owning project" 
        type:
          type: string
          description: "Backlog type: PRODUCT, SPRINT" 
        sprintId:
          type: string
          format: uuid
          description: "Sprint reference (required if type=SPRINT)" 

    BacklogCreate:
      type: object
      description: "Request body for creating a Backlog"
      properties:
        # Writable fields only (excludes auto-generated IDs, timestamps, version)
        name:
          type: string

    BacklogUpdate:
      type: object
      description: "Request body for updating a Backlog"
      properties:
        # Subset of writable fields for partial update
        name:
          type: string

    BacklogItem:
      type: object
      required:
        - backlogItemId
        - workPackageId
        - position
      properties:
        backlogItemId:
          type: string
          format: uuid
          description: "Unique item identifier" 
        workPackageId:
          type: string
          format: uuid
          description: "Reference to work package in ps-prj-svc" 
        position:
          type: integer
          description: "Sort position in the backlog (lower = higher priority)" 
        storyPoints:
          type: integer
          description: "Estimated story points" 

    Board:
      type: object
      required:
        - boardId
        - tenantId
        - projectId
        - name
        - type
        - isDefault
      properties:
        boardId:
          type: string
          format: uuid
          description: "Unique board identifier" 
        tenantId:
          type: string
          format: uuid
          description: "Owning tenant" 
        projectId:
          type: string
          format: uuid
          description: "Owning project" 
        name:
          type: string
          description: "Board name" 
        type:
          type: string
          description: "Board type: STATUS, ASSIGNEE, VERSION, CUSTOM" 
        isDefault:
          type: boolean
          description: "Whether this is the project's default board" 

    BoardCreate:
      type: object
      description: "Request body for creating a Board"
      properties:
        # Writable fields only (excludes auto-generated IDs, timestamps, version)
        name:
          type: string

    BoardUpdate:
      type: object
      description: "Request body for updating a Board"
      properties:
        # Subset of writable fields for partial update
        name:
          type: string

    BoardColumn:
      type: object
      required:
        - columnId
        - name
        - filterCriteria
        - sortOrder
      properties:
        columnId:
          type: string
          format: uuid
          description: "Unique column identifier" 
        name:
          type: string
          description: "Column display name" 
        filterCriteria:
          type: object
          description: "Filter criteria determining which WPs appear (e.g., status=IN_PROGRESS)" 
        wipLimit:
          type: integer
          description: "Maximum number of WPs allowed in this column (0 = unlimited)" 
        sortOrder:
          type: integer
          description: "Column position on the board" 


  parameters:
    tenantId:
      name: X-Tenant-ID
      in: header
      required: true
      schema:
        type: string
        format: uuid
      description: Tenant identifier (from JWT or header)

    pageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 0
      description: Page number (zero-based)

    sizeParam:
      name: size
      in: query
      schema:
        type: integer
        default: 25
        maximum: 100
      description: Page size
