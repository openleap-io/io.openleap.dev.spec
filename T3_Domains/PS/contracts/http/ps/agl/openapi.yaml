tags:
  - name: Sprint
    description: "A fixed-length time box during which a set of backlog items is planned, executed, and reviewed. Spri"
  - name: Backlog
    description: "An ordered list of work packages representing planned work. Product backlog contains all known work;"
  - name: Board
    description: "A configurable columnar visualization of work packages organized by status, assignee, version, or cu"

paths:

  /api/ps/agl/v1/sprints:
    get:
      operationId: list_sprints
      summary: "List all Sprint entities"
      tags:
        - Sprint
      security:
        - bearerAuth: [ps.agl:read]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 25
        - name: tenantId
          in: header
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Paginated list of sprints
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: array
                    items:
                      $ref: '#/components/schemas/Sprint'
                  totalElements:
                    type: integer
                  page:
                    type: integer
                  size:
                    type: integer
    post:
      operationId: create_sprint
      summary: "Create a new Sprint"
      tags:
        - Sprint
      security:
        - bearerAuth: [ps.agl:write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SprintCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Sprint'
          headers:
            Location:
              schema:
                type: string
            ETag:
              schema:
                type: string
        '400':
          description: Validation error
        '409':
          description: Conflict (duplicate)

  /api/ps/agl/v1/sprints/{id}:
    get:
      operationId: get_sprint
      summary: "Get Sprint by ID"
      tags:
        - Sprint
      security:
        - bearerAuth: [ps.agl:read]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Sprint'
        '404':
