components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    Project:
      type: object
      required:
        - projectId
        - tenantId
        - code
        - name
        - status
        - version
        - createdAt
        - updatedAt
        - createdBy
        - updatedBy
      properties:
        projectId:
          type: string
          format: uuid
          description: "Unique project identifier" 
        tenantId:
          type: string
          format: uuid
          description: "Owning tenant" 
        code:
          type: string
          description: "Human-readable project code, unique per tenant" 
        name:
          type: string
          description: "Project name, min 1 char, max 255 chars" 
        description:
          type: string
          description: "Project description, max 4000 chars" 
        status:
          type: string
          description: "Project lifecycle status" 
        projectType:
          type: string
          description: "Classification (e.g., internal, customer, R&D)" 
        priority:
          type: string
          description: "Priority: LOW, MEDIUM, HIGH, CRITICAL" 
        customerId:
          type: string
          format: uuid
          description: "Reference to BP party (customer/sponsor)" 
        managerId:
          type: string
          format: uuid
          description: "IAM user ID of the project manager" 
        plannedStart:
          type: string
          format: date
          description: "Planned start date" 
        plannedEnd:
          type: string
          format: date
          description: "Planned end date" 
        actualStart:
          type: string
          format: date
          description: "Actual start date" 
        actualEnd:
          type: string
          format: date
          description: "Actual end date" 
        calendarId:
          type: string
          format: uuid
          description: "Working calendar reference (from cal-svc)" 
        lifecycleId:
          type: string
          format: uuid
          description: "Lifecycle template reference (from ps-prt-svc)" 
        templateId:
          type: string
          format: uuid
          description: "Source template if created from template" 
        version:
          type: integer
          description: "Optimistic lock version" 
        createdAt:
          type: string
          format: date-time
          description: "Creation timestamp" 
        updatedAt:
          type: string
          format: date-time
          description: "Last update timestamp" 
        createdBy:
          type: string
          format: uuid
          description: "IAM user ID of creator" 
        updatedBy:
          type: string
          format: uuid
          description: "IAM user ID of last updater" 

    ProjectCreate:
      type: object
      description: "Request body for creating a Project"
      properties:
        # Writable fields only (excludes auto-generated IDs, timestamps, version)
        name:
          type: string

    ProjectUpdate:
      type: object
      description: "Request body for updating a Project"
      properties:
        # Subset of writable fields for partial update
        name:
          type: string

    WorkPackage:
      type: object
      required:
        - workPackageId
        - projectId
        - code
        - subject
        - type
        - status
        - sortOrder
        - version
      properties:
        workPackageId:
          type: string
          format: uuid
          description: "Unique work package identifier" 
        projectId:
          type: string
          format: uuid
          description: "Owning project" 
        parentId:
          type: string
          format: uuid
          description: "Parent work package ID (null for root)" 
        code:
          type: string
          description: "Human-readable short code (e.g., WP-0042)" 
        subject:
          type: string
          description: "Title, min 1 char, max 500 chars" 
        description:
          type: string
          description: "Detailed description, max 10000 chars" 
        type:
          type: string
          description: "Work package type: PHASE, TASK, FEATURE, BUG, USER_STORY, MILESTONE, EPIC" 
        status:
          type: string
          description: "Status: NEW, IN_PROGRESS, ON_HOLD, DONE, CANCELLED" 
        priority:
          type: string
          description: "Priority: LOW, MEDIUM, HIGH, URGENT" 
        assigneeId:
          type: string
          format: uuid
          description: "Assigned IAM user ID" 
        plannedStart:
          type: string
          description: "Planned start date" 
        plannedEnd:
          type: string
          description: "Planned end date" 
        actualStart:
          type: string
          description: "Actual start date" 
        actualEnd:
          type: string
          description: "Actual end date" 
        duration:
          type: integer
          description: "Planned duration in working days" 
        plannedEffort:
          type: number
          description: "Planned effort in hours" 
        percentComplete:
          type: integer
          description: "Completion percentage 0-100" 
        storyPoints:
          type: integer
          description: "Story points (agile estimation)" 
        sortOrder:
          type: integer
          description: "Sort order within parent" 
        version:
          type: integer
          description: "Optimistic lock version" 


  parameters:
    tenantId:
      name: X-Tenant-ID
      in: header
      required: true
      schema:
        type: string
        format: uuid
      description: Tenant identifier (from JWT or header)

    pageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 0
      description: Page number (zero-based)

    sizeParam:
      name: size
      in: query
      schema:
        type: integer
        default: 25
        maximum: 100
      description: Page size
