# Screen Contract (AUI) — F-SD-001-01
# Feature: Create Sales Order
# Generated: 2026-04-04
# Template: screen-contract-aui.yaml v1.0.0

featureId: F-SD-001-01
name: "Create Sales Order"

taskModel:
  root:
    operator: sequential
    children:
      - task: load-reference-data
        description: "Load customer list and product catalog for resolution"
      - task: fill-form
        description: "User fills order header and line items"
        operator: enabling
        enabledBy: load-reference-data
      - task: validate-and-submit
        description: "Validate form and confirm order"
        operator: enabling
        enabledBy: fill-form

zones:
  - id: zone-header
    name: "Action Bar"
    type: fixed
    priority: 1
    dataBinding: "_meta"
    fields:
      - "Back navigation (link)"
      - "Page title (display)"

  - id: zone-order-header
    name: "Order Header"
    type: fixed
    priority: 2
    dataBinding: "order"
    fields:
      - "Customer (search input)"
      - "Delivery Date (date picker)"
      - "Payment Terms (select)"

  - id: zone-core
    name: "Line Items"
    type: fixed
    priority: 3
    dataBinding: "order.lines"
    fields:
      - "Product (search input)"
      - "Quantity (number)"
      - "Unit Price (display)"
      - "Line Total (display)"
      - "Remove Line (action)"

  - id: zone-extension
    name: "Extension Zone"
    type: variable
    priority: 10
    extensionPoint: "ext.orderHeaderFields"
    absentRule: panel-section-hidden

  - id: zone-actions
    name: "Form Actions"
    type: fixed
    priority: 99
    dataBinding: "_meta.allowedActions"
    fields:
      - "Cancel (action)"
      - "Confirm Order (action: primary)"

absentRules:
  - zone: zone-extension
    condition: "No extension point filled for this product"
    rule: panel-section-hidden

businessRules:
  roleGates:
    - zone: zone-actions
      action: "Confirm Order"
      requiresRole: "SALES_REP"
  stateConditions:
    - action: "Confirm Order"
      enabledWhen: "form.isValid == true AND order.lines.length >= 1 AND creditStatus != 'BLOCKED'"
  actionConsequences:
    - action: "Confirm Order"
      onSuccess: "navigate('order-status', orderId) + toast('sd.F-SD-001-01.action.confirm.success')"
    - action: "Cancel"
      onSuccess: "navigate('orders-list')"
