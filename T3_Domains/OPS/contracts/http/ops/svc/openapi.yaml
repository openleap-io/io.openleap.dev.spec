openapi: 3.1.0
info:
  title: OPS Service Delivery Service
  version: 1.0.0
  description: |
    Service delivery capture — record delivered services and generate billable items for FI.

    Full endpoint specification derived from domain-specs/ops_svc-spec.md §6.
  contact:
    name: team-ops
    email: ops-engineering@openleap.io
  x-owner: team-ops
  x-suite: ops
  x-domain: svc

servers:
  - url: http://localhost:8211
    description: Local development
  - url: https://api.openleap.io
    description: Production

paths:
  /api/ops/svc/v1:
    get:
      summary: Service root / health
      operationId: getServiceInfo
      tags: [health]
      responses:
        '200':
          description: Service info

  /api/ops/svc/v1/deliveries:
    get:
      summary: List service deliveries
      operationId: listDeliveries
      tags: [deliveries]
      responses:
        '200':
          description: Paginated list of deliveries
    post:
      summary: Record service delivery
      operationId: createDelivery
      tags: [deliveries]
      responses:
        '201':
          description: Delivery recorded

  # Full paths defined in domain-specs/ops_svc-spec.md §6.

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
