# Screen Contract (AUI) — F-IAM-001-07
# Feature: Credential Management
# Generated: 2026-04-03
# Template: screen-contract-aui.yaml v1.0.0
#
# Derived from F-IAM-001-07 feature-spec.md:
#   §2 User Journey → Task Model
#   §3 Interaction Requirements → Zones
#   §4 Edge Cases → Absent Rules

featureId: F-IAM-001-07
name: "Credential Management"

# ──────────────────────────────────────────────
# Task Model (from §2 User Journey)
# ──────────────────────────────────────────────
taskModel:
  root:
    operator: sequential
    children:
      - task: load-reference-data
        description: "Load reference catalogs and form defaults"
      - task: fill-form
        description: "User fills in required and optional fields"
        operator: enabling
        enabledBy: load-reference-data
      - task: validate-and-submit
        description: "Validate all fields and submit"
        operator: enabling
        enabledBy: fill-form

# ──────────────────────────────────────────────
# Zones (from §3 Interaction Requirements)
# ──────────────────────────────────────────────
zones:
  - id: zone-header
    name: "Action Bar"
    type: fixed
    priority: 1
    dataBinding: "_meta"
    fields:
      - "Back navigation (link)"
      - "Page title (display)"

  - id: zone-core
    name: "Core Details"
    type: fixed
    priority: 2
    dataBinding: "form"
    fields:
      - "Credential Type (select)"
      - "Expiry (date picker)"
      - "Revoke Previous (checkbox)"

  - id: zone-extension
    name: "Extension Zone"
    type: variable
    priority: 10
    extensionPoint: "ext.customFields"
    absentRule: panel-section-hidden

  - id: zone-actions
    name: "Form Actions"
    type: fixed
    priority: 99
    dataBinding: "_meta.allowedActions"
    fields:
      - "Cancel (action)"
      - "Submit (action: primary)"

# ──────────────────────────────────────────────
# Absent-Rules
# ──────────────────────────────────────────────
absentRules:
  - zone: zone-extension
    condition: "No extension point filled for this product"
    rule: panel-section-hidden

# ──────────────────────────────────────────────
# Business Rules (AUI)
# ──────────────────────────────────────────────
businessRules:
  roleGates:
    - zone: zone-actions
      action: "Submit"
      requiresRole: "IAM_SYSTEM_ADMIN"
  stateConditions:
    - action: "Submit"
      enabledWhen: "form.isValid == true"
  actionConsequences:
    - action: "Submit"
      onSuccess: "navigate('detail') + toast('iam.F-IAM-001-07.action.submit.success')"
