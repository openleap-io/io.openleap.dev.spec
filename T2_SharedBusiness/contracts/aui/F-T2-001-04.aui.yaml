# AUI Screen Contract for F-T2-001-04 — Contact Management
# Template: screen-contract-aui.yaml v1.0.0
# Generated: 2026-04-03

featureId: "F-T2-001-04"
featureName: "Contact Management"
suite: "t2"
domain: "bp"
status: "draft"

taskModel:
  root:
    operator: "sequential"
    children:
      - id: "load"
        operator: "enabling"
        description: "Load initial data before user interaction"
      - id: "interact"
        operator: "sequential"
        children:
          - id: "fillForm"
            operator: "concurrent"
            description: "User fills form fields (any order)"
          - id: "submit"
            operator: "alternative"
            description: "User submits or cancels"
            children:
              - id: "save"
                description: "Submit the form"
              - id: "cancel"
                description: "Discard changes"

zones:
  - id: "header"
    type: "fixed"
    priority: 1
    description: "Breadcrumb and page title"

  - id: "coreData"
    type: "fixed"
    priority: 2
    description: "Core form fields from t2-bp-svc domain model"
    dataBinding:
      service: "t2-bp-svc"
      endpoint: "/api/t2/bp/v1/..."

  - id: "extensions"
    type: "feature-gated"
    priority: 3
    description: "Extension zone for T3 domain-specific fields"
    extensionPointId: "ext.f_t2_001_04.customFields"

  - id: "actions"
    type: "fixed"
    priority: 4
    description: "Action buttons (Save, Cancel)"

absentRules:
  - zone: "extensions"
    whenAbsent: "collapse-up"
    reason: "No T3 extensions configured for this product"

businessRules:
  - id: "roleGate"
    condition: "user.hasAnyRole(BP_USER | BP_ADMIN)"
    action: "enable"
    target: "all"

  - id: "readOnlyMode"
    condition: "feature.mode_readOnly == true"
    action: "disable"
    target: "zones.coreData, zones.actions.save"
